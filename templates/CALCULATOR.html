<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debt Calculator</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h2>Debt Calculator</h2>
        <form method="post" id="debtForm">
            {{ form.hidden_tag() }}
            <div class="form-group">
                {{ form.apr.label }}
                {{ form.apr(class="form-control") }}
            </div>
            <div class="form-group">
                {{ form.min_pay.label }}
                {{ form.min_pay(class="form-control") }}
            </div>
            <div class="form-group">
                {{ form.debt_balance.label }}
                {{ form.debt_balance(class="form-control") }}
            </div>
            {{ form.submit(class="btn btn-primary") }}
        </form>

        <hr>

        <div>
            <canvas id="myChart" width="400" height="400"></canvas>
        </div>
        <button onclick="saveAsPDF()" class="btn btn-secondary mt-3">Save as PDF</button>
    </div>

    <script>

        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['APR', 'Minimum Payment', 'Debt Balance'],
                datasets: [{
                    label: 'Values',
                    data: [{{apr}}, {{min_pay}}, {{debt_balance}}],
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.2)',
                        'rgba(54, 162, 235, 0.2)',
                        'rgba(255, 206, 86, 0.2)'
                    ],
                    borderColor: [
                        'rgba(255, 99, 132, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        function saveAsPDF() {
            var image = document.getElementById('myChart').toDataURL("image/png");
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/create-pdf', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.responseType = 'blob';

            xhr.onload = function(e) {
                if (this.status == 200) {
                    var blob = new Blob([this.response], {type: 'application/pdf'});
                    var link = document.createElement('a');
                    link.href = window.URL.createObjectURL(blob);
                    link.download = 'debt_calculator_chart.pdf';
                    link.click();
                }
            };

            xhr.onerror = function() {
                console.error('An error occurred during the XHR request.');
            };

            xhr.send(JSON.stringify({image: image}));
        }
    </script>
</body>
</html>
