<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debt Calculator</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h2>Debt Calculator</h2>
        <form method="post" id="debtForm">
            {{ form.hidden_tag() }}
            <div class="form-group">
                {{ form.apr.label }}
                {{ form.apr(class="form-control") }}
            </div>
            <div class="form-group">
                {{ form.min_pay.label }}
                {{ form.min_pay(class="form-control") }}
            </div>
            <div class="form-group">
                {{ form.debt_balance.label }}
                {{ form.debt_balance(class="form-control") }}
            </div>
            {{ form.submit(class="btn btn-primary") }}
        </form>
</body>
